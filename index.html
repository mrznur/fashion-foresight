<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta Tags -->
    <title>Fashion Foresight — Modern Luxury Fashion</title>
    <meta name="title" content="Fashion Foresight — Modern Luxury Fashion" />
    <meta
      name="description"
      content="Discover impeccably curated fashion crafted for the modern individual. Premium clothing and accessories with unmatched style."
    />
    <meta name="keywords" content="luxury fashion, designer clothing, Fashion Foresight, premium menswear, style" />
    <meta name="author" content="Fashion Foresight" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#64020e" />

    <!-- Open Graph / Social Media -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://fashionforesight.com/" />
    <meta property="og:title" content="Fashion Foresight — Modern Luxury Fashion" />
    <meta property="og:description" content="Discover impeccably curated fashion crafted for the modern individual." />
    <meta property="og:image" content="https://images.unsplash.com/photo-1775831726606-3d98ebefb57a?w=1200&q=80" />
    <meta property="og:site_name" content="Fashion Foresight" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Fashion Foresight — Modern Luxury Fashion" />
    <meta name="twitter:description" content="Discover impeccably curated fashion crafted for the modern individual." />
    <meta name="twitter:image" content="https://images.unsplash.com/photo-1775831726606-3d98ebefb57a?w=1200&q=80" />

    <!-- Security -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />

    <!-- Favicon — using desktop logo as icon -->
    <link rel="icon" type="image/png" href="/images/logo-desktop.png" />
    <link rel="apple-touch-icon" href="/images/logo-desktop.png" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Inter:wght@300;400;500;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400;1,600&display=swap" rel="stylesheet" />

    <!-- Preconnect for performance -->
    <link rel="preconnect" href="https://images.unsplash.com" />
    <link rel="dns-prefetch" href="https://images.unsplash.com" />

    <!-- Preload critical logo asset -->
    <link rel="preload" as="image" href="/images/logo-desktop.png" />

    <!-- Structured Data (JSON-LD) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "ClothingStore",
        "name": "Fashion Foresight",
        "description": "Modern luxury fashion with unmatched craftsmanship",
        "url": "https://fashionforesight.com",
        "logo": "https://fashionforesight.com/images/logo-desktop.png",
        "openingHours": ["Mo-Fr 10:00-19:00", "Sa 10:00-18:00"],
        "priceRange": "$$$"
      }
    </script>

    <style>
      html, body { height: 100%; margin: 0; }
      #root { height: 100%; }
      body { background-color: #ffffff; }
    </style>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
